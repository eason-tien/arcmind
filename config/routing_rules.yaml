# ArcMind 多 Provider 模型路由規則
# 版本 2.5 — MAIN: MiniMax M2.5 230B (全Agent统一)

version: "2.5"

# ── 自訂 Provider ──
providers:
  nvidia:
    api_key: "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"
    base_url: "https://integrate.api.nvidia.com/v1"

# ── MAIN 模型（MiniMax M2.5 230B）──
default: custom:MiniMax-M2.5

# 任務類型路由
task_type_rules:
  # 複雜任務（架構、代碼、深度推理）→ 用最強的 405B 巨獸
  - match: [code_gen, plan, architecture, complex_analysis, deep_reasoning]
    model: custom:MiniMax-M2.5
    max_tokens: 8192

  # 一般任務與報告整理（中文最好） → Qwen 2.5 72B
  - match: [summarize, data, report, general, code_review, browser, file_ops]
    model: custom:MiniMax-M2.5
    max_tokens: 8192

  # 快速分類 → Llama-3.1-405B
  - match: [classify, quick_check, format, extract, web_search]
    model: custom:MiniMax-M2.5
    max_tokens: 2048

  # 本地 Ollama（隱私敏感任務）
  - match: [local_only, private]
    model: ollama:qwen3:8b
    max_tokens: 4096

  # 远程 Ollama (192.168.1.151) - 大模型任務
  - match: [large_model, coding, reasoning]
    model: ollama:qwen3:14b@192.168.1.151
    max_tokens: 8192

# 成本預算路由
budget_rules:
  - budget: free
    model: custom:MiniMax-M2.5
  - budget: low
    model: custom:MiniMax-M2.5
  - budget: medium
    model: custom:MiniMax-M2.5
  - budget: high
    model: custom:MiniMax-M2.5

# Fallback 鏈
fallback_chain:
  - custom:MiniMax-M2.5
  - custom:MiniMax-M2.5
  - custom:MiniMax-M2.5
  - ollama:qwen3:8b
  - ollama:qwen3:14b@192.168.1.151