## ArcMind 模型路由規則
## 格式: provider:model_id
## v0.9.3: main(CEO) uses openai:gpt-5.4, all other agents use custom:MiniMax-M2.5

version: "3.0"

# ── 自訂 Provider ──
# providers: API keys are loaded from .env (OPENAI_API_KEY, CUSTOM_MODEL_API_KEY)
# Do NOT put API keys in this file — they belong in .env only.

# ── MAIN 模型（CEO: OpenAI gpt-5.4）──
default: openai:gpt-5.4

## 任務類型路由
task_type_rules:
  - match: [planning, plan, 規劃]
    model: openai:gpt-5.4
    max_tokens: 8192
  - match: [code, code_review]
    model: custom:MiniMax-M2.5
    max_tokens: 8192
  - match: [classify, quick]
    model: ollama:qwen3:8b
    max_tokens: 2048

## 預算路由
budget_rules:
  - budget: low
    model: ollama:qwen3:8b
  - budget: medium
    model: custom:MiniMax-M2.5
  - budget: high
    model: openai:gpt-5.4

## 失敗降級鏈（OpenAI 優先，MiniMax 為二線 fallback）
fallback_chain:
  - openai:gpt-5.4
  - custom:MiniMax-M2.5
  - ollama:qwen3:8b
