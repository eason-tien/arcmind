# ArcMind 多 Provider 模型路由規則
# 版本 2.3 — MAIN: NVIDIA kimi-K2.5

version: "2.3"

# ── 自訂 Provider ──
providers:
  nvidia:
    api_key: "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"
    base_url: "https://integrate.api.nvidia.com/v1"

# ── MAIN 模型（NVIDIA kimi-K2.5）──
default: nvidia:moonshotai/kimi-k2-instruct

# 任務類型路由
task_type_rules:
  # 一般任務 → kimi-K2.5
  - match: [code_gen, summarize, plan, browser, file_ops, general, code_review, architecture, complex_analysis, deep_reasoning]
    model: nvidia:moonshotai/kimi-k2-instruct
    max_tokens: 8192

  # 快速分類 → kimi-K2.5
  - match: [classify, quick_check, format, extract, web_search]
    model: nvidia:moonshotai/kimi-k2-instruct
    max_tokens: 2048

  # 本地 Ollama（隱私敏感任務）
  - match: [local_only, private]
    model: ollama:qwen3:8b
    max_tokens: 4096

  # 远程 Ollama (192.168.1.151) - 大模型任務
  - match: [large_model, coding, reasoning]
    model: ollama:qwen3:14b@192.168.1.151
    max_tokens: 8192

  # Analysis Agent
  - match: [analysis, summarize, data, report]
    model: nvidia:meta/llama-3.1-70b-instruct
    max_tokens: 8192

# 成本預算路由
budget_rules:
  - budget: free
    model: nvidia:meta/llama-3.1-70b-instruct
  - budget: low
    model: nvidia:moonshotai/kimi-k2-instruct
  - budget: medium
    model: nvidia:moonshotai/kimi-k2-instruct
  - budget: high
    model: nvidia:moonshotai/kimi-k2-instruct

# Fallback 鏈
fallback_chain:
  - nvidia:moonshotai/kimi-k2-instruct
  - nvidia:meta/llama-3.1-70b-instruct
  - ollama:qwen3:8b
  - ollama:qwen3:14b@192.168.1.151
