# ── ArcMind Docker Compose ─────────────────────────────────
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # View logs
#   docker compose down           # Stop all services

services:
  arcmind:
    build: .
    container_name: arcmind
    restart: unless-stopped
    ports:
      - "${ARCMIND_PORT:-8100}:8100"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - arcmind-net

  mysql:
    image: mysql:8.0
    container_name: arcmind-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-arcmind_dev}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-arcmind}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arcmind-net

volumes:
  mysql_data:

networks:
  arcmind-net:
    driver: bridge
