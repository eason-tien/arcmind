global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'arcmind'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # node-exporter (系统指标)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor (容器指标)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # blackbox-exporter (URL监控)
  - job_name: 'blackbox'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['blackbox-exporter:9115']

  # ArcMind API 应用指标
  - job_name: 'arcmind-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'

  # Grafana 指标
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
