name: CI — Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        env:
          ARCMIND_ENV: test
          OLLAMA_ENABLED: "false"
          ENABLE_VECTOR_MEMORY: "false"
        run: |
          python -m pytest tests/ -v --tb=short 2>&1 | tee test_output.txt
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test_output.txt

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('test_output.txt', 'utf8');
            const lastLines = output.split('\n').slice(-30).join('\n');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 CI Failed: Tests on Python ${context.payload.after?.substring(0,7) || 'unknown'}`,
              body: `## CI Test Failure\n\n**Branch:** ${context.ref}\n**Commit:** ${context.sha}\n**Python:** ${{ matrix.python-version }}\n**Trigger:** ${context.eventName}\n\n### Test Output (last 30 lines)\n\`\`\`\n${lastLines}\n\`\`\`\n\n### Links\n- [Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`,
              labels: ['bug', 'ci-failure']
            });
