# 台股交易 Skill

## Skill ID
`trading`

## 描述
台股真实规则模拟交易系统 - 自主执行买卖决策，追求8%以上获益率

## 功能
1. 市场数据分析
2. 个股筛选与评估
3. 交易信号生成
4. 仓位管理
5. 止损止盈执行

## 交易规则（硬性约束）
- 市场范围：仅限TWSE上市股票（排除上柜、兴柜、ETF、期权等）
- 最大仓位：60%
- 最低现金储备：10,000 TWD
- 止损线：-7%
- 止盈线：+15%

## 输入
```json
{
  "action": "analyze|trade|check_positions|summary"
}
```

## 输出
交易决策和执行结果
