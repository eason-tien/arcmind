# ArcMind 內建技能清單
# 格式相容 OpenClaw Skill manifest

version: "1.0"

skills:
  - name: web_search
    module: web_search.py
    handler: run
    version: "1.0"
    description: 使用 DuckDuckGo 搜尋網路並返回摘要結果
    permissions: [network]
    tags: [search, web, information]
    governor_required: true
    inputs:
      - name: query
        type: string
        required: true
        description: 搜尋關鍵字
      - name: max_results
        type: int
        required: false
        default: 5
        description: 最多返回幾筆結果
    outputs:
      - name: results
        type: list
        description: 搜尋結果列表

  - name: file_ops
    module: file_ops.py
    handler: run
    version: "1.0"
    description: 本地檔案讀寫、列目錄、刪除等操作
    permissions: [filesystem]
    tags: [file, io, storage]
    governor_required: true
    inputs:
      - name: operation
        type: string
        required: true
        description: "read | write | list | delete | exists | mkdir"
      - name: path
        type: string
        required: true
        description: 目標路徑
      - name: content
        type: string
        required: false
        description: 寫入內容（operation=write 時必填）
    outputs:
      - name: result
        type: any
        description: 操作結果

  - name: code_exec
    module: code_exec.py
    handler: run
    version: "1.0"
    description: 在受限沙盒中執行 Python 程式碼片段
    permissions: [exec]
    tags: [code, python, exec]
    governor_required: true
    inputs:
      - name: code
        type: string
        required: true
        description: 要執行的 Python 程式碼
      - name: timeout_s
        type: int
        required: false
        default: 10
        description: 執行超時秒數
    outputs:
      - name: stdout
        type: string
      - name: stderr
        type: string
      - name: exit_code
        type: int

  - name: trading
    module: trading.py
    handler: trading_skill
    version: "1.0"
    description: 台股真实规则模拟交易系统 - 自主执行买卖决策，追求8%以上获益率
    permissions: [filesystem, network]
    tags: [trading, stock, taiwan]
    governor_required: false
    inputs:
      - name: action
        type: string
        required: false
        default: "trade"
        description: "trade | summary | check_positions | analyze"
    outputs:
      - name: result
        type: dict
        description: 交易执行结果

  - name: self_iteration
    module: self_iteration.py
    handler: run
    version: "1.0"
    description: 每週 Agent 自我迭代會議 — 收集情報、圓桌會議、生成改進計劃
    permissions: [filesystem, network, shell]
    tags: [iteration, self-improvement, meeting, cron]
    governor_required: false
    inputs:
      - name: phase
        type: string
        required: false
        default: "meeting"
        description: "meeting (週度會議) | daily_check (每日執行檢查)"
    outputs:
      - name: result
        type: dict
        description: 迭代結果

  - name: daily_report
    module: daily_report.py
    handler: run
    version: "1.0"
    description: 每日早報 — 天氣、新聞、系統狀態、迭代進度
    permissions: [filesystem, network]
    tags: [report, daily, news, weather, cron]
    governor_required: false
    inputs:
      - name: action
        type: string
        required: false
        default: "report"
        description: "report (早報) | update_location (更新位置)"
    outputs:
      - name: result
        type: dict
        description: 報告結果

  - name: github_skill
    module: github_skill.py
    handler: run
    version: "1.0"
    description: GitHub 完整整合 — Repos/PRs/Issues/Actions/Releases
    permissions: [network]
    tags: [github, git, pr, issue, ci, release]
    governor_required: false
    inputs:
      - name: action
        type: string
        required: true
        description: "list_repos | get_repo_status | create_pr | list_prs | merge_pr | list_issues | create_issue | close_issue | comment | list_actions | trigger_action | create_release"
      - name: repo
        type: string
        required: false
        description: "owner/repo 格式"
    outputs:
      - name: result
        type: dict
        description: GitHub API 結果

  - name: document_skill
    module: document_skill.py
    handler: run
    version: "1.0"
    description: 文件生成 — 分析公司模板 + 生成 PPT/Excel（公司模板模式或自由設計）
    permissions: [filesystem, network]
    tags: [ppt, excel, document, report, template, spreadsheet]
    governor_required: false
    inputs:
      - name: action
        type: string
        required: true
        description: "analyze_template | list_templates | create_ppt | create_excel"
      - name: template
        type: string
        required: false
        description: "公司模板名稱（使用公司模板模式）"
      - name: style
        type: string
        required: false
        description: "自由設計風格: corporate | modern | elegant | nature | tech"
    outputs:
      - name: result
        type: dict
        description: 生成結果

  - name: env_discovery
    module: env_discovery.py
    handler: run
    version: "1.0"
    description: 三維度認知掃描 — L1宿主機/L2服務/L3網路拓撲（跨平台 macOS+Windows+Linux）
    permissions: [filesystem, network]
    tags: [env, system, host, service, network, topology, discovery]
    governor_required: false
    inputs:
      - name: action
        type: string
        required: true
        description: "host_info | resource_check | scan_ports | list_services | find_configs | db_discovery | network_interfaces | arp_table | route_table | full_scan"
    outputs:
      - name: result
        type: dict
        description: 掃描結果

  - name: gitnexus_skill
    module: gitnexus_skill.py
    handler: run
    version: "1.0"
    description: GitNexus 代碼智慧引擎 — 知識圖譜查詢、爆炸半徑分析、智能重命名
    permissions: [filesystem, network]
    tags: [code, graph, analysis, impact, refactor, gitnexus]
    governor_required: false
    inputs:
      - name: action
        type: string
        required: true
        description: "query | context | impact | detect | rename | list_repos | reindex | status"
    outputs:
      - name: result
        type: dict
        description: 查詢/分析結果

  - name: gemini_bridge
    module: gemini_bridge.py
    handler: run
    version: "1.0"
    description: ArcMind 与 antigravity/gemini CLI 整合桥接 — 零 API Key 调用 Gemini
    permissions: [shell, filesystem]
    tags: [gemini, antigravity, ai, bridge, cli]
    governor_required: false
    inputs:
      - name: task
        type: string
        required: true
        description: 任务描述（将发送给 gemini CLI）
      - name: cwd
        type: string
        required: false
        description: 工作目录（默认当前目录）
      - name: timeout
        type: int
        required: false
        default: 600
        description: 超时秒数（默认 10 分钟）
      - name: mode
        type: string
        required: false
        default: "direct"
        description: "direct（直接调用）或 filebox（文件信箱）"
      - name: task_id
        type: string
        required: false
        description: 任务ID（filebox 模式用）
    outputs:
      - name: stdout
        type: string
        description: gemini CLI 标准输出
      - name: stderr
        type: string
        description: gemini CLI 标准错误
      - name: exit_code
        type: int
        description: 退出码
      - name: task_id
        type: string
        description: 任务ID

  - name: antigravity_bridge
    module: antigravity_bridge.py
    handler: run
    version: "1.0"
    description: 通过文件系统控制 Antigravity 桌面应用 — 零 API Key，零封号风险
    permissions: [filesystem]
    tags: [antigravity, ai, bridge, desktop, control]
    governor_required: false
    inputs:
      - name: task
        type: string
        required: true
        description: 任务描述（将写入 task.md）
      - name: conversation_id
        type: string
        required: false
        description: 指定对话ID（默认使用最新对话）
      - name: timeout
        type: int
        required: false
        default: 300
        description: 等待结果超时秒数（默认 5 分钟）
    outputs:
      - name: result
        type: string
        description: Antigravity 处理结果
      - name: conversation_id
        type: string
        description: 使用的对话ID

  - name: antigravity_status
    module: antigravity_bridge.py
    handler: check_status
    version: "1.0"
    description: 检查 Antigravity 运行状态和对话列表
    permissions: [filesystem]
    tags: [antigravity, status, monitor]
    governor_required: false
    inputs: []
    outputs:
      - name: running
        type: bool
        description: Antigravity 是否在运行
      - name: latest_conversation
        type: string
        description: 最新对话ID
      - name: brain_dir_exists
        type: bool
        description: brain 目录是否存在

  - name: antigravity_conversations
    module: antigravity_bridge.py
    handler: get_conversations
    version: "1.0"
    description: 获取所有 Antigravity 对话列表
    permissions: [filesystem]
    tags: [antigravity, conversation, list]
    governor_required: false
    inputs: []
    outputs:
      - name: conversations
        type: list
        description: 对话列表

  - name: agent_delegation
    module: agent_delegation.py
    handler: delegate_task
    version: "1.0"
    description: "Multi-Agent Orchestration: Delegate a task to a specialized sub-agent (e.g., researcher, engineer) for asynchronous execution."
    permissions: [filesystem]
    tags: [orchestration, delegation, multi-agent, paperclip]
    governor_required: false
    inputs:
      - name: assignee
        type: string
        required: true
        description: "The role of the sub-agent, e.g., 'researcher' or 'engineer'"
      - name: title
        type: string
        required: true
        description: "Short title or description of the task"
      - name: task_data
        type: dict
        required: false
        description: "Detailed instructions and context for the sub-agent"
      - name: parent_task_id
        type: int
        required: false
        description: "The current task ID delegating this work. Pass this to link the tasks."
    outputs:
      - name: task_id
        type: int
        description: "The ID of the newly spawned sub-task"
      - name: message
        type: string

  - name: worker_heartbeat
    module: worker_heartbeat.py
    handler: run
    version: "1.0"
    description: "Multi-Agent Orchestration: Background worker that processes delegated sub-tasks."
    permissions: [filesystem]
    tags: [orchestration, heartbeat, cron, paperclip]
    governor_required: false
    inputs: []
    outputs:
      - name: processed
        type: int
        description: "Number of tasks processed"
      - name: message
        type: string

  - name: windows_delegation
    module: windows_delegation.py
    handler: run
    version: "1.0"
    description: "Multi-Agent Orchestration: Delegate a shell/python task to the remote Windows PC at 192.168.1.151."
    permissions: [network]
    tags: [orchestration, delegation, windows, paperclip]
    governor_required: false
    inputs:
      - name: title
        type: string
        required: true
        description: "Short title or description of the task"
      - name: command
        type: string
        required: true
        description: "The powershell command or python script to execute on the remote machine"
      - name: task_type
        type: string
        required: false
        default: "shell"
        description: "'shell' (powershell) or 'python'"
    outputs:
      - name: success
        type: bool
      - name: stdout
        type: string
      - name: stderr
        type: string

  - name: ai_trend_monitor
    module: ai_trend_monitor.py
    handler: handler
    version: "1.0.0"
    description: "AI趋势监控 - 每天自动搜集AI/科技资讯，分析趋势，生成需求报告"
    permissions: [filesystem, network]
    tags: [ai, trend, monitor, news, cron]
    governor_required: false
    inputs:
      - name: action
        type: string
        required: false
        default: "daily"
        description: "daily (每日扫描) | report (生成报告) | search (自定义搜索)"
      - name: days
        type: int
        required: false
        default: 7
        description: "报告天数 (action=report 时)"
      - name: query
        type: string
        required: false
        description: "搜索关键词 (action=search 时)"
    outputs:
      - name: status
        type: string
      - name: json_output
        type: string
      - name: report_output
        type: string

  - name: code_assistant
    module: code_assistant.py
    handler: handler
    version: "1.0.0"
    description: "代码开发助手 - 代码生成、修复、优化、解释"
    permissions: [filesystem, shell]
    tags: [code, development, assistant, generator]
    governor_required: false
    inputs:
      - name: action
        type: string
        required: false
        default: "generate"
        description: "generate (生成) | fix (修复) | optimize (优化) | explain (解释) | execute (执行) | test (测试)"
      - name: language
        type: string
        required: false
        default: "python"
        description: "编程语言: python/bash/javascript"
      - name: prompt
        type: string
        required: false
        description: "代码描述 (action=generate 时)"
      - name: code
        type: string
        required: false
        description: "代码内容 (action=fix/optimize/explain/execute/test 时)"
      - name: error
        type: string
        required: false
        description: "错误信息 (action=fix 时)"
      - name: focus
        type: string
        required: false
        default: "performance"
        description: "优化方向 (action=optimize 时): performance/readability/security"
      - name: filename
        type: string
        required: false
        description: "保存文件名"
      - name: test_type
        type: string
        required: false
        default: "syntax"
        description: "测试类型 (action=test 时): syntax/unit/integration"
    outputs:
      - name: status
        type: string
      - name: code
        type: string
      - name: output_file
        type: string
      - name: executed
        type: bool

  - name: agent_builder
    module: agent_builder.py
    handler: handler
    version: "1.0.0"
    description: "多步骤智能体工作流构建器 - 帮助用户快速创建和管理 AI Agent 任务链"
    permissions: [filesystem]
    tags: [agent, workflow, orchestration, builder, automation]
    governor_required: false
    inputs:
      - name: action
        type: string
        required: false
        default: "list_agents"
        description: "create_agent | create_workflow | add_step | execute_workflow | list_agents | list_workflows | get_status | list_executions"
      - name: name
        type: string
        required: false
        description: "Agent/工作流名称"
      - name: description
        type: string
        required: false
        description: "描述"
      - name: capabilities
        type: array
        required: false
        description: "Agent 能力列表"
      - name: model
        type: string
        required: false
        default: "ollama:qwen3:8b"
        description: "使用的模型"
      - name: agent_id
        type: string
        required: false
        description: "Agent ID"
      - name: workflow_id
        type: string
        required: false
        description: "工作流 ID"
      - name: step_name
        type: string
        required: false
        description: "步骤名称"
      - name: step_type
        type: string
        required: false
        default: "task"
        description: "步骤类型: task/condition/parallel/loop"
      - name: step_config
        type: object
        required: false
        description: "步骤配置"
      - name: inputs
        type: object
        required: false
        description: "执行输入参数"
      - name: execution_id
        type: string
        required: false
        description: "执行 ID"
    outputs:
      - name: status
        type: string
      - name: agent
        type: object
      - name: workflow
        type: object
      - name: step
        type: object
      - name: execution
        type: object
      - name: agents
        type: array
      - name: workflows
        type: array
      - name: executions
        type: array

  - name: security_scan
    module: security_scan.py
    handler: full_security_audit
    version: "1.0"
    description: "白帽安全扫描与漏洞评估 — 端口扫描(nmap)、Web漏洞(nikto)、系统审计(lynis)、SSL检测、代码审计(bandit)"
    permissions: [shell, network, filesystem]
    tags: [security, scan, vulnerability, audit, pentest, whitehat, nmap, nikto]
    governor_required: false
    inputs:
      - name: target
        type: string
        required: false
        default: "localhost"
        description: "扫描目标 IP 或域名"
      - name: include_web
        type: bool
        required: false
        default: false
        description: "是否包含 Web 漏洞扫描"
    outputs:
      - name: summary
        type: dict
        description: "审计摘要"
      - name: report_path
        type: string
        description: "报告文件路径"
