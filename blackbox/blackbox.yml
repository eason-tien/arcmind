# BlackboxExporter 配置
modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      preferred_ip_protocol: "ip4"

  http_post_2xx:
    prober: http
    timeout: 5s
    http:
      method: POST
      preferred_ip_protocol: "ip4"

  tcp_connect:
    prober: tcp
    timeout: 5s

  ping:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: "ip4"

  dns:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: "ip4"
      validate_answer_rrs:
        fail_if_response_matches_regexp:
          - ".*"
        succeed_if_response_matches_regexp:
          - "127\\.0\\.0\\.1"
      validate_authority_rrs:
        fail_if_response_matches_regexp:
          - ".*"
