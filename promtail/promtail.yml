# Promtail 日志收集配置
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*.log

  - job_name: arcmind
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          job: arcmind-api
          __path__: /var/log/arcmind/*.log
